<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">ComfyUI Remote Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .slate-card { background-color: #1e293b; border: 1px solid #334155; }
        .accent-primary { background-color: #3b82f6; }
        .accent-primary:hover { background-color: #2563eb; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .loader-container { position: relative; width: 100px; height: 100px; }
        .loader-circle {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: #3b82f6;
            border-radius: 50%; animation: loader-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .loader-circle:nth-child(2) { animation-delay: -0.3s; border-top-color: #6366f1; }
        .loader-circle:nth-child(3) { animation-delay: -0.6s; border-top-color: #a855f7; }
        @keyframes loader-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .processing-pulse { animation: pulse-text 2s ease-in-out infinite; }
        @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal-bg { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-blue-600 rounded-lg">
                <i data-lucide="cpu" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight" data-i18n="app_title">ComfyUI Remote Generator</h1>
            <span class="ml-2 px-2 py-0.5 bg-slate-800 text-slate-400 text-xs rounded border border-slate-700 uppercase font-semibold tracking-wider" data-i18n="admin_title">Administrator</span>
        </div>

        <div class="flex items-center gap-6">
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-900/30 border border-red-500/50 text-red-400 text-sm font-medium">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span data-i18n="disconnected">ComfyUI not responding</span>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="#" id="view-user-link" class="text-sm font-medium text-slate-400 hover:text-white transition-colors flex items-center gap-2">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    <span data-i18n="user_view">User View</span>
                </a>
                <div class="h-6 w-px bg-slate-800"></div>
                <div class="flex items-center gap-2">
                    <i data-lucide="languages" class="w-4 h-4 text-slate-400"></i>
                    <select id="language-select" class="bg-slate-800 border border-slate-700 text-sm rounded-md px-2 py-1 outline-none">
                        <option value="en">English</option>
                        <option value="hr">Hrvatski</option>
                        <option value="sl">Slovenščina</option>
                        <option value="sk">Slovenčina</option>
                        <option value="ro">Română</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar: Admin Management -->
        <aside class="w-96 bg-slate-900 border-r border-slate-800 flex flex-col h-full overflow-hidden">
            <div class="flex-1 overflow-y-auto scrollbar-hide">
                <!-- Workflows List -->
                <div class="p-4 border-b border-slate-800">
                    <button id="upload-btn" class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium flex items-center justify-center gap-2 transition-all shadow-lg">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span data-i18n="upload_new_workflow">Upload new workflow</span>
                    </button>
                    <input type="file" id="workflow-file" class="hidden" accept=".json">
                </div>

                <div class="p-4 space-y-4 border-b border-slate-800">
                    <div class="flex items-center justify-between text-xs font-bold text-slate-500 uppercase tracking-widest px-2">
                        <span data-i18n="saved_workflows">Workflows</span>
                        <i data-lucide="folder" class="w-3 h-3"></i>
                    </div>
                    <div id="workflows-list" class="space-y-1"></div>
                </div>

                <!-- Visibility Config (Media & Params) -->
                <div class="p-4 space-y-8">
                    <!-- Media Visibility -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between text-xs font-bold text-slate-500 uppercase tracking-widest px-2">
                            <span data-i18n="upload_media">Media Config</span>
                            <i data-lucide="eye" class="w-3 h-3"></i>
                        </div>
                        <div id="media-config-container" class="space-y-3">
                            <!-- Populated with checkboxes for media visibility -->
                        </div>
                    </div>

                    <!-- Parameter Visibility -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 bg-slate-900/80 backdrop-blur sticky top-0 z-10 py-1 border-b border-slate-800/50">
                            <span data-i18n="params">Parameters</span>
                            <div class="flex gap-3">
                                <button id="select-all-btn" class="flex items-center gap-1 hover:text-blue-400 transition-colors" title="Select All">
                                    <i data-lucide="check-square" class="w-3 h-3"></i>
                                    <span data-i18n="select_all">All</span>
                                </button>
                                <button id="deselect-all-btn" class="flex items-center gap-1 hover:text-blue-400 transition-colors" title="Deselect All">
                                    <i data-lucide="square" class="w-3 h-3"></i>
                                    <span data-i18n="deselect_all">None</span>
                                </button>
                            </div>
                        </div>
                        <div id="parameters-container" class="space-y-6 px-1"></div>
                    </div>

                    <!-- Presets List (In Sidebar after all nodes) -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between text-xs font-bold text-slate-500 uppercase tracking-widest px-2">
                            <span data-i18n="preset_images">Preset Images</span>
                            <i data-lucide="layout-template" class="w-3 h-3"></i>
                        </div>
                        <div id="presets-container" class="grid grid-cols-2 gap-2"></div>
                        <button id="add-preset-btn" class="w-full py-2 bg-slate-800 hover:bg-slate-700 border border-dashed border-slate-700 text-slate-400 rounded-lg text-xs font-medium transition-all">
                            + <span data-i18n="add_preset">Add Preset Image</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Bottom Actions -->
            <div class="p-4 border-t border-slate-800 bg-slate-900 space-y-4 shadow-2xl">
                <button id="save-ui-config" class="w-full py-2.5 bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 border border-blue-500/30 font-bold rounded-lg transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    <span data-i18n="save_config">Save Configuration</span>
                </button>

                <div class="pt-4 border-t border-slate-800 space-y-3">
                    <input type="text" id="save-name" data-i18n="workflow_name" placeholder="Workflow Name" class="w-full bg-slate-800 border border-slate-700 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                    <textarea id="save-description" data-i18n="description" placeholder="Description" rows="2" class="w-full bg-slate-800 border border-slate-700 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none resize-none"></textarea>
                    <button id="save-workflow-btn" class="w-full py-2 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white text-xs font-bold rounded-md transition-all uppercase tracking-widest">
                        <span data-i18n="save">Save Workflow</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area (Mirrors User View) -->
        <main class="flex-1 overflow-y-auto p-8 bg-slate-950 scrollbar-hide space-y-8">
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center">
                <div class="text-center">
                    <div class="loader-container mx-auto mb-8">
                        <div class="loader-circle"></div>
                        <div class="loader-circle"></div>
                        <div class="loader-circle"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i data-lucide="zap" class="w-8 h-8 text-blue-500 animate-pulse"></i>
                        </div>
                    </div>
                    <p class="text-2xl font-bold text-white mb-2 processing-pulse" data-i18n="processing">Processing...</p>
                    <p class="text-slate-400 text-sm max-w-xs mx-auto" data-i18n="processing_hint">Please wait while the AI magic happens</p>
                </div>
            </div>

            <!-- Header Info -->
            <div id="workflow-header" class="hidden">
                <h2 id="current-workflow-title" class="text-3xl font-bold text-white mb-2 tracking-tight"></h2>
                <p id="current-workflow-desc" class="text-slate-400 text-sm"></p>
            </div>

            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-700 py-20">
                <i data-lucide="settings" class="w-20 h-20 mb-6 opacity-10"></i>
                <p class="text-xl font-medium" data-i18n="select_workflow_sidebar">Select a workflow to start configuring</p>
            </div>

            <div id="workflow-config" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Left: Unified Active Inputs Container -->
                <div id="active-inputs-container" class="space-y-6">
                    <!-- Media and Parameters will be interleaved here based on inputOrder -->
                </div>

                <!-- Right: Result -->
                <div class="space-y-6">
                    <div class="slate-card rounded-xl p-6 shadow-xl flex flex-col min-h-[500px]">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-2">
                                <i data-lucide="image" class="w-5 h-5 text-amber-500"></i>
                                <span data-i18n="result">Result Preview</span>
                            </h3>
                            <button id="generate-btn" class="px-10 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold rounded-lg shadow-lg transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                                <span data-i18n="generate">Generate</span>
                            </button>
                        </div>

                        <div id="output-display" class="flex-1 flex items-center justify-center bg-slate-900 rounded-lg border-2 border-dashed border-slate-800 relative overflow-hidden min-h-[400px]">
                            <div id="output-placeholder" class="text-slate-700 text-center p-8">
                                <i data-lucide="sparkles" class="w-12 h-12 mb-4 mx-auto opacity-10"></i>
                                <p data-i18n="connected" class="text-xs">Ready for generation</p>
                            </div>
                            <div id="output-media-container" class="w-full h-full hidden flex items-center justify-center bg-black"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Output Browser -->
            <div class="slate-card rounded-xl p-6 shadow-xl mt-8">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <h3 class="text-lg font-bold flex items-center gap-2 cursor-pointer" onclick="toggleCollapse('outputs-gallery-container')">
                            <i data-lucide="gallery-thumbnails" class="w-5 h-5 text-pink-500"></i>
                            <span data-i18n="output_browser">Output History</span>
                            <i data-lucide="chevron-down" id="outputs-gallery-chevron" class="w-4 h-4 ml-2 transition-transform"></i>
                        </h3>
                    </div>
                    <button id="refresh-outputs-btn" class="p-2 hover:bg-slate-700 rounded-full transition-all">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="outputs-gallery-container" class="transition-all duration-300 overflow-hidden">
                    <div id="outputs-gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 pb-4"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Sidebar -->
    <div id="settings-sidebar" class="fixed inset-y-0 left-0 w-80 bg-slate-900 border-r border-slate-800 shadow-2xl z-[60] sidebar-transition -translate-x-full">
        <div class="p-6 h-full flex flex-col">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-xl font-bold flex items-center gap-2"><i data-lucide="settings" class="w-6 h-6"></i> <span data-i18n="server_settings">Settings</span></h3>
                <button id="close-settings" class="p-2 hover:bg-slate-800 rounded-lg text-slate-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-6 flex-1 overflow-y-auto scrollbar-hide">
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="block text-sm font-medium text-slate-400" data-i18n="comfy_urls">ComfyUI URLs</label>
                        <button id="add-url-btn" class="p-1 bg-blue-600 hover:bg-blue-700 text-white rounded transition-all">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div id="comfy-urls-container" class="space-y-2">
                        <!-- URL inputs will be added here -->
                    </div>
                </div>
            </div>
            <div class="pt-6 border-t border-slate-800">
                <button id="update-url-btn" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-all" data-i18n="update">Update</button>
            </div>
        </div>
    </div>

    <button id="settings-btn" class="fixed bottom-6 left-6 w-12 h-12 bg-slate-800 hover:bg-slate-700 text-white rounded-full shadow-2xl flex items-center justify-center z-50 border border-slate-700"><i data-lucide="settings" class="w-6 h-6"></i></button>

    <div id="media-modal" class="hidden fixed inset-0 z-[200] modal-bg flex items-center justify-center p-4">
        <button id="close-modal" class="absolute top-6 right-6 p-3 bg-black/50 text-white rounded-full"><i data-lucide="x" class="w-8 h-8"></i></button>
        <div id="modal-content" class="max-w-7xl max-h-[90vh] w-full h-full flex items-center justify-center"></div>
    </div>

    <script src="/translations.js?v=1.0.1"></script>
    <script src="/qwen3d.js?v=1.0.1"></script>
    <script src="/admin.js?v=1.0.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const sb = document.getElementById('settings-sidebar');
            document.getElementById('settings-btn').onclick = () => sb.classList.remove('-translate-x-full');
            document.getElementById('close-settings').onclick = () => sb.classList.add('-translate-x-full');

            const ls = document.getElementById('language-select');
            ls.value = localStorage.getItem('preferredLanguage') || 'en';
            translatePage(ls.value);
            ls.onchange = (e) => translatePage(e.target.value);

            fetch('/api/config').then(r => r.json()).then(cfg => {
                document.getElementById('view-user-link').href = `http://${window.location.hostname}:${cfg.publicPort}`;
                if (window.renderUrlSettings) window.renderUrlSettings(cfg.comfyuiUrls);
            });
        });
    </script>
</body>
</html>
