<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">ComfyUI Remote Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .slate-card { background-color: #1e293b; border: 1px solid #334155; }
        .accent-primary { background-color: #3b82f6; }
        .accent-primary:hover { background-color: #2563eb; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal-bg { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-lg">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight" data-i18n="app_title">ComfyUI Remote Generator</h1>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-900/30 border border-red-500/50 text-red-400 text-sm font-medium">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span data-i18n="disconnected">ComfyUI not responding</span>
            </div>

            <div class="flex items-center gap-4">
                <a href="#" id="view-admin-link" class="text-sm font-medium text-slate-400 hover:text-white transition-colors flex items-center gap-2">
                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                    <span data-i18n="admin_view">Admin View</span>
                </a>

                <div class="h-6 w-px bg-slate-800"></div>

                <div class="flex items-center gap-2">
                    <i data-lucide="languages" class="w-4 h-4 text-slate-400"></i>
                    <select id="language-select" class="bg-slate-800 border border-slate-700 text-sm rounded-md px-2 py-1 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <option value="en">English</option>
                        <option value="hr">Hrvatski</option>
                        <option value="sl">Slovenščina</option>
                        <option value="sk">Slovenčina</option>
                        <option value="ro">Română</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-950 space-y-8 scrollbar-hide">
        <!-- Workflow Selection for User -->
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight" data-i18n="select_workflow_menu">Select a workflow</h2>
                    <p class="text-slate-400 text-sm" data-i18n="admin_configured">Workflows are configured by the administrator</p>
                </div>
                <select id="workflow-select" class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white outline-none focus:ring-2 focus:ring-blue-500 min-w-[250px] shadow-lg">
                    <option value="">-- Select a workflow --</option>
                </select>
            </div>

            <!-- Loading Overlay -->
            <div id="loading-overlay" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center">
                <div class="text-center">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-16 w-16 mb-4 mx-auto"></div>
                    <p class="text-xl font-semibold" data-i18n="processing">Processing...</p>
                </div>
            </div>

            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-600 py-20 bg-slate-900/20 rounded-3xl border-2 border-dashed border-slate-800/50">
                <i data-lucide="workflow" class="w-20 h-20 mb-6 opacity-20"></i>
                <p class="text-xl font-medium" data-i18n="select_workflow_menu">Select a workflow from the menu above</p>
            </div>

            <!-- Main Generator Interface -->
            <div id="generator-interface" class="hidden space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Left: Media & Inputs -->
                    <div class="space-y-6">
                        <div id="media-inputs-container" class="space-y-6">
                            <!-- Populated dynamically -->
                        </div>

                        <div id="parameters-card" class="slate-card rounded-xl p-6 shadow-xl hidden">
                            <h3 class="text-lg font-bold flex items-center gap-2 mb-6">
                                <i data-lucide="sliders" class="w-5 h-5 text-blue-500"></i>
                                <span data-i18n="params">Parameters</span>
                            </h3>
                            <div id="params-container" class="space-y-4">
                                <!-- Populated dynamically -->
                            </div>
                        </div>
                    </div>

                    <!-- Right: Execution & Results -->
                    <div class="space-y-6">
                        <div class="slate-card rounded-xl p-6 shadow-xl flex flex-col h-full">
                            <div class="flex items-center justify-between mb-6">
                                <h3 class="text-lg font-bold flex items-center gap-2">
                                    <i data-lucide="image" class="w-5 h-5 text-amber-500"></i>
                                    <span data-i18n="result">Result</span>
                                </h3>
                                <button id="generate-btn" class="px-10 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold rounded-lg shadow-lg shadow-blue-900/20 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                                    <span data-i18n="generate">Generate</span>
                                </button>
                            </div>

                            <div id="output-display" class="flex-1 flex items-center justify-center bg-slate-900/50 rounded-lg border-2 border-dashed border-slate-800 relative overflow-hidden min-h-[400px]">
                                <div id="output-placeholder" class="text-slate-700 text-center p-8">
                                    <i data-lucide="sparkles" class="w-12 h-12 mb-4 mx-auto opacity-20"></i>
                                    <p data-i18n="check_connection">Checking connection...</p>
                                </div>
                                <div id="output-media-container" class="w-full h-full hidden flex items-center justify-center bg-black">
                                    <!-- Dynamic content -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Output Gallery for User -->
                <div class="slate-card rounded-xl p-6 shadow-xl">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-lg font-bold flex items-center gap-2">
                            <i data-lucide="history" class="w-5 h-5 text-pink-500"></i>
                            <span data-i18n="output_browser">Output Browser</span>
                        </h3>
                        <button id="refresh-outputs-btn" class="p-2 hover:bg-slate-700 rounded-full transition-all">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="outputs-gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                        <div class="col-span-full text-center py-8 text-slate-600 italic" data-i18n="no_outputs">No items found</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Large View -->
    <div id="media-modal" class="hidden fixed inset-0 z-[200] modal-bg flex items-center justify-center p-4">
        <button id="close-modal" class="absolute top-6 right-6 p-3 bg-black/50 hover:bg-black text-white rounded-full transition-all">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <div id="modal-content" class="max-w-7xl max-h-[90vh] w-full h-full flex items-center justify-center"></div>
    </div>

    <script src="/translations.js"></script>
    <script>
        let currentWorkflow = null;
        let mediaFiles = {};
        let parameters = {};
        let bypassedNodes = {};
        let uiConfig = null;

        async function loadWorkflows() {
            try {
                const res = await fetch('/api/workflows/list');
                const data = await res.json();
                const select = document.getElementById('workflow-select');
                select.innerHTML = '<option value="" data-i18n="select_workflow_menu">-- Select a workflow --</option>';
                data.workflows.forEach(w => {
                    const opt = document.createElement('option');
                    opt.value = w.id;
                    opt.textContent = w.name;
                    select.appendChild(opt);
                });
                translatePage(localStorage.getItem('preferredLanguage') || 'en');
            } catch (e) { console.error(e); }
        }

        async function loadWorkflow(id) {
            if (!id) {
                document.getElementById('generator-interface').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`/api/workflows/load/${id}`, { method: 'POST' });
                const data = await res.json();
                currentWorkflow = data.analysis;
                uiConfig = data.uiConfig;
                mediaFiles = {};
                parameters = {};
                bypassedNodes = {};

                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('generator-interface').classList.remove('hidden');
                
                renderInterface();
                translatePage(localStorage.getItem('preferredLanguage') || 'en');
            } catch (e) { console.error(e); }
        }

        async function refreshOutputs() {
            try {
                const res = await fetch('/api/outputs');
                const data = await res.json();
                const gallery = document.getElementById('outputs-gallery');
                gallery.innerHTML = '';

                if (data.files.length === 0) {
                    gallery.innerHTML = '<div class="col-span-full text-center py-8 text-slate-600 italic" data-i18n="no_outputs">No items found</div>';
                    translatePage(localStorage.getItem('preferredLanguage') || 'en');
                    return;
                }

                data.files.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'slate-card rounded-lg overflow-hidden group cursor-pointer relative aspect-square';
                    
                    if (file.type === 'video') {
                        card.innerHTML = `<video src="${file.url}" class="w-full h-full object-cover"></video>
                                         <div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-black/40 transition-all">
                                            <i data-lucide="play-circle" class="w-10 h-10 text-white opacity-80"></i>
                                         </div>`;
                    } else {
                        card.innerHTML = `<img src="${file.url}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500">`;
                    }

                    card.onclick = () => showModal(file.url, file.type);
                    gallery.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        function showModal(url, type) {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = '';

            if (type === 'video') {
                content.innerHTML = `<video src="${url}" controls autoplay class="max-w-full max-h-full rounded-lg"></video>`;
            } else {
                content.innerHTML = `<img src="${url}" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">`;
            }

            modal.classList.remove('hidden');
        }

        function renderInterface() {
            const mediaContainer = document.getElementById('media-inputs-container');
            const paramsContainer = document.getElementById('params-container');
            mediaContainer.innerHTML = '';
            paramsContainer.innerHTML = '';

            // Render Media Inputs
            currentWorkflow.inputs.forEach(group => {
                const groupEl = document.createElement('div');
                groupEl.className = 'slate-card rounded-xl p-6 shadow-lg';
                groupEl.innerHTML = `<h4 class="font-bold mb-4 text-slate-300 flex items-center gap-2">
                                        <i data-lucide="image" class="w-4 h-4"></i> ${group.groupTitle || group.title}
                                     </h4>`;

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-4';

                group.inputs.forEach(input => {
                    if (uiConfig.visibleInputs && uiConfig.visibleInputs[input.key] === false) return;

                    const div = document.createElement('div');
                    div.className = 'space-y-3';
                    const label = uiConfig.inputNames?.[input.key] || input.title;

                    div.innerHTML = `
                        <label class="block text-sm font-medium text-slate-400">${label}</label>
                        <div class="relative group aspect-video bg-slate-900 rounded-lg border-2 border-dashed border-slate-700 hover:border-blue-500 transition-all overflow-hidden flex items-center justify-center cursor-pointer">
                            <input type="file" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="handleMediaUpload(this.files[0], '${input.key}')">
                            <div id="preview-${input.key}" class="text-center p-4">
                                <i data-lucide="${input.valueType === 'video' ? 'video' : 'image'}" class="w-8 h-8 mb-2 mx-auto text-slate-600"></i>
                                <p class="text-xs text-slate-500" data-i18n="click_or_drag">Click or drag</p>
                            </div>
                        </div>
                    `;
                    grid.appendChild(div);
                });

                if (grid.children.length > 0) {
                    groupEl.appendChild(grid);
                    mediaContainer.appendChild(groupEl);
                }
            });

            // Render Parameters
            let visibleParamsCount = 0;
            currentWorkflow.advancedInputs.forEach(group => {
                group.inputs.forEach(param => {
                    if (uiConfig.visibleParams && uiConfig.visibleParams[param.key] === true) {
                        visibleParamsCount++;
                        const div = document.createElement('div');
                        div.className = 'space-y-1.5';
                        const label = uiConfig.inputNames?.[param.key] || param.title;

                        let inputHtml = '';
                        if (param.valueType === 'boolean') {
                            inputHtml = `<select class="w-full bg-slate-800 border border-slate-700 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                         onchange="parameters['${param.key}'] = this.value">
                                            <option value="true" ${param.defaultValue === true ? 'selected' : ''} data-i18n="yes">Yes</option>
                                            <option value="false" ${param.defaultValue === false ? 'selected' : ''} data-i18n="no">No</option>
                                         </select>`;
                        } else {
                            inputHtml = `<input type="${param.valueType === 'number' ? 'number' : 'text'}"
                                         value="${param.defaultValue || ''}"
                                         class="w-full bg-slate-800 border border-slate-700 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                         onchange="parameters['${param.key}'] = this.value">`;
                        }

                        div.innerHTML = `<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">${label}</label>${inputHtml}`;
                        paramsContainer.appendChild(div);
                    }
                });
            });

            document.getElementById('parameters-card').classList.toggle('hidden', visibleParamsCount === 0);
            lucide.createIcons();
        }

        async function handleMediaUpload(file, inputKey) {
            if (!file) return;
            const preview = document.getElementById(`preview-${inputKey}`);
            preview.innerHTML = '<div class="loader ease-linear rounded-full border-2 border-t-2 border-slate-700 h-6 w-6 mx-auto"></div>';

            const formData = new FormData();
            formData.append('media', file);

            try {
                const res = await fetch(`/api/upload/media/${inputKey}`, { method: 'POST', body: formData });
                const data = await res.json();
                mediaFiles[inputKey] = data.filename;

                if (data.type === 'video') {
                    preview.innerHTML = `<video src="/output/${data.filename}" class="w-full h-full object-cover"></video>`;
                } else {
                    preview.innerHTML = `<img src="/output/${data.filename}" class="w-full h-full object-cover">`;
                }
            } catch (e) {
                console.error(e);
                preview.innerHTML = '<i data-lucide="alert-circle" class="w-8 h-8 text-red-500 mx-auto"></i>';
                lucide.createIcons();
            }
        }

        async function runWorkflow() {
            const btn = document.getElementById('generate-btn');
            const overlay = document.getElementById('loading-overlay');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.classList.add('opacity-50');
            overlay.classList.remove('hidden');

            try {
                const res = await fetch('/api/workflow/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        workflowId: document.getElementById('workflow-select').value,
                        mediaFiles,
                        parameters,
                        bypassedNodes
                    })
                });

                const data = await res.json();
                if (data.success && data.files.length > 0) {
                    const file = data.files[0];
                    const container = document.getElementById('output-media-container');
                    const placeholder = document.getElementById('output-placeholder');
                    
                    placeholder.classList.add('hidden');
                    container.classList.remove('hidden');
                    container.innerHTML = '';

                    if (file.type === 'video') {
                        container.innerHTML = `<video src="${file.url}" controls autoplay class="max-w-full max-h-full rounded"></video>`;
                    } else {
                        container.innerHTML = `<img src="${file.url}" class="max-w-full max-h-full object-contain cursor-pointer" onclick="showModal('${file.url}', 'image')">`;
                    }

                    refreshOutputs();
                } else if (data.error) {
                    alert('Error: ' + data.error);
                }
            } catch (e) {
                alert('Connection error');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                overlay.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadWorkflows();
            refreshOutputs();

            document.getElementById('workflow-select').addEventListener('change', (e) => loadWorkflow(e.target.value));
            document.getElementById('generate-btn').addEventListener('click', runWorkflow);
            document.getElementById('refresh-outputs-btn').addEventListener('click', refreshOutputs);
            document.getElementById('close-modal').addEventListener('click', () => document.getElementById('media-modal').classList.add('hidden'));
            
            const langSelect = document.getElementById('language-select');
            langSelect.value = localStorage.getItem('preferredLanguage') || 'en';
            langSelect.addEventListener('change', (e) => translatePage(e.target.value));

            fetch('/api/config').then(r => r.json()).then(cfg => {
                document.getElementById('view-admin-link').href = `http://${window.location.hostname}:${cfg.adminPort}`;
            });

            setInterval(async () => {
                try {
                    const res = await fetch('/api/health');
                    const data = await res.json();
                    const badge = document.getElementById('status-badge');
                    if (data.comfyui === 'connected') {
                        badge.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-900/30 border border-emerald-500/50 text-emerald-400 text-sm font-medium';
                        badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span data-i18n="connected">Connected</span>';
                    } else {
                        badge.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-900/30 border border-red-500/50 text-red-400 text-sm font-medium';
                        badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span><span data-i18n="disconnected">Disconnected</span>';
                    }
                    translatePage(localStorage.getItem('preferredLanguage') || 'en');
                } catch (e) {}
            }, 5000);
        });
    </script>
</body>
</html>
