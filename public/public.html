<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">ComfyUI Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #64748b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.5;
            padding-top: 80px;
        }
        
        .navbar {
            height: 64px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1001;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--text-main);
            text-decoration: none;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover { color: var(--text-main); }

        .lang-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .workflow-selector {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }
        
        .workflow-dropdown {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.9375rem;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            font-weight: 500;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 16px;
        }
        
        .status-online { color: var(--success); }
        .status-offline { color: var(--error); }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 { 
            color: var(--text-main);
            margin-bottom: 20px; 
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card h3 { 
            color: var(--text-muted);
            margin-bottom: 16px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        
        .input-container {
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.3);
        }
        
        .input-header {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .input-header .name { flex: 1; font-weight: 500; font-size: 0.875rem; }
        
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            margin: 16px;
            background: rgba(15, 23, 42, 0.2);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .upload-area:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
        
        .image-preview { margin: 16px; text-align: center; }
        .image-preview img, .image-preview video { max-width: 100%; max-height: 200px; border-radius: 8px; object-fit: cover; }
        
        .preset-section {
            margin: 16px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
        }
        
        .preset-title { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; }
        .preset-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .preset-thumb {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .preset-thumb:hover { border-color: var(--primary); transform: translateY(-2px); }
        
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }
        
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
        
        button {
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .generate-btn {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            margin-top: 24px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .results { margin-top: 32px; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        .image-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .image-card img, .image-card video { width: 100%; display: block; }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .workflow-info {
            background: rgba(59, 130, 246, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 0.875rem;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--primary);
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; }
            .navbar-brand span { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <i data-lucide="cpu"></i>
            <span data-i18n="app_title">ComfyUI Remote</span>
        </a>
        <div class="navbar-actions">
            <a href="/index.html" class="nav-link" data-i18n="admin_view">Admin View</a>
            <select class="lang-select" id="langSelect">
                <option value="en">English</option>
                <option value="hr">Hrvatski</option>
                <option value="sl">Slovenščina</option>
                <option value="sk">Slovenčina</option>
                <option value="ro">Română</option>
            </select>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <div class="workflow-selector">
                <select id="workflowSelect" class="workflow-dropdown">
                    <option value="" data-i18n="select_workflow_menu">-- Select a workflow --</option>
                </select>
            </div>
            <div class="status" id="status">
                <i data-lucide="refresh-cw" class="spin" style="width: 14px; height: 14px;"></i>
                <span data-i18n="check_connection">Checking connection...</span>
            </div>
        </div>
        
        <div id="workflowContainer">
            <div class="card" style="text-align: center; padding: 80px;">
                <i data-lucide="folder-open" style="width: 48px; height: 48px; color: var(--secondary); margin-bottom: 16px;"></i>
                <p data-i18n="select_workflow_menu">Select a workflow from the top menu</p>
                <small style="color: var(--text-muted);" data-i18n="admin_configured">Workflows are configured by the administrator</small>
            </div>
        </div>
        
        <div class="results" id="resultsContainer" style="display: none;">
            <h2 data-i18n="result">Result</h2>
            <div id="resultArea"></div>
        </div>
    </div>
    
    <script src="/translations.js"></script>
    <script>
        lucide.createIcons();

        let currentWorkflowId = null;
        let workflowAnalysis = null;
        let mediaFiles = {};
        let currentParameters = {};
        let workflowPresets = [];
        let uiConfig = { inputOrder: [], inputNames: {}, visibleParams: {} };
        let autoRandomSeed = {};
        
        const workflowSelect = document.getElementById('workflowSelect');
        const statusDiv = document.getElementById('status');
        const workflowContainer = document.getElementById('workflowContainer');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultArea = document.getElementById('resultArea');
        const langSelect = document.getElementById('langSelect');
        const adminViewLink = document.querySelector('[data-i18n="admin_view"]');

        // Language
        langSelect.value = localStorage.getItem('preferredLanguage') || 'en';
        langSelect.addEventListener('change', (e) => {
            translatePage(e.target.value);
            if (currentWorkflowId) renderInterface();
        });
        setTimeout(() => translatePage(langSelect.value), 100);
        
        async function loadWorkflows() {
            try {
                console.log('Loading workflows...');
                const res = await fetch('/api/workflows/list');
                const data = await res.json();
                if (data.success && data.workflows) {
                    const currentLang = langSelect.value;
                    workflowSelect.innerHTML = `<option value="">-- ${getTranslation('select_workflow_menu', currentLang)} --</option>` +
                        data.workflows.map(wf => `<option value="${wf.id}">${escapeHtml(wf.name)}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading workflows:', error);
            }
        }
        
        workflowSelect.addEventListener('change', async () => {
            const id = workflowSelect.value;
            if (!id) {
                location.reload();
                return;
            }
            await loadWorkflow(id);
        });
        
        async function loadWorkflow(id) {
            try {
                workflowContainer.innerHTML = `<div style="text-align: center; padding: 40px;"><div class="spinner"></div><p data-i18n="loading">Loading...</p></div>`;
                translatePage(langSelect.value);
                
                const res = await fetch(`/api/workflows/load/${id}`, { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    console.log('Workflow loaded:', id);
                    currentWorkflowId = id;
                    workflowAnalysis = data.analysis;
                    workflowPresets = data.presets || [];
                    uiConfig = data.uiConfig || { inputOrder: [], inputNames: {}, visibleParams: {} };
                    
                    if (workflowAnalysis.advancedInputs) {
                        workflowAnalysis.advancedInputs.forEach(g => g.inputs.forEach(p => {
                            if (p.key.includes('seed') || p.title?.toLowerCase().includes('seed')) autoRandomSeed[p.key] = true;
                        }));
                    }
                    renderInterface();
                }
            } catch (error) {
                console.error('Error loading workflow:', error);
            }
        }
        
        async function handleMediaUpload(file, inputKey) {
            if (!file) return;
            const formData = new FormData();
            formData.append('media', file);
            try {
                const res = await fetch(`/api/upload/media/${inputKey}`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    mediaFiles[inputKey] = data.filename;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const previewDiv = document.getElementById(`preview_${inputKey}`);
                        if (previewDiv) {
                            if (data.type === 'video') previewDiv.innerHTML = `<video controls><source src="${e.target.result}"></video>`;
                            else previewDiv.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                        }
                    };
                    reader.readAsDataURL(file);
                }
            } catch (error) {}
        }
        
        async function usePreset(preset, inputKey) {
            const blob = await fetch(preset.dataUrl).then(r => r.blob());
            const file = new File([blob], preset.filename || `${preset.name}.png`, { type: 'image/png' });
            const formData = new FormData();
            formData.append('media', file);
            try {
                const res = await fetch(`/api/upload/media/${inputKey}`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    mediaFiles[inputKey] = data.filename;
                    const previewDiv = document.getElementById(`preview_${inputKey}`);
                    if (previewDiv) previewDiv.innerHTML = `<img src="${preset.dataUrl}" alt="${preset.name}">`;
                }
            } catch (error) {}
        }
        
        function generateRandomSeed() { return Math.floor(Math.random() * 1000000000000); }
        
        async function runWorkflow() {
            if (!currentWorkflowId) return;
            const params = { ...currentParameters, _autoRandomSeed: autoRandomSeed };
            resultsContainer.style.display = 'block';
            resultArea.innerHTML = `<div style="text-align: center; padding: 48px;"><div class="spinner"></div><p style="color: var(--text-muted);" data-i18n="processing">Processing...</p></div>`;
            translatePage(langSelect.value);
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            try {
                const res = await fetch('/api/workflow/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mediaFiles, parameters: params, workflowId: currentWorkflowId }) });
                const data = await res.json();
                if (data.error) {
                    resultArea.innerHTML = `<div style="padding: 16px; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); border-radius: 8px; color: var(--error); font-size: 0.875rem; display: flex; align-items: flex-start; gap: 12px;"><i data-lucide="alert-circle" style="flex-shrink: 0; width: 18px; height: 18px;"></i> <span>${escapeHtml(data.error)}</span></div>`;
                    lucide.createIcons();
                } else if (data.files) {
                    let fhtml = `<div style="margin-bottom: 24px; color: var(--success); font-weight: 500; display: flex; align-items: center; gap: 8px;"><i data-lucide="check-circle"></i> <span data-i18n="generation_complete">Complete!</span></div><div class="image-grid">`;
                    data.files.forEach(f => {
                        fhtml += `<div class="image-card">${f.type === 'video' ? `<video controls autoplay loop muted><source src="${f.url}" type="video/mp4"></video>` : `<img src="${f.url}">`}<div style="padding: 12px; font-size: 0.75rem; color: var(--text-muted); text-align: center;">${f.filename}</div></div>`;
                    });
                    fhtml += `</div>`;
                    resultArea.innerHTML = fhtml;
                    lucide.createIcons();
                    translatePage(langSelect.value);
                }
            } catch (error) {
                resultArea.innerHTML = `<div style="padding: 16px; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); border-radius: 8px; color: var(--error); font-size: 0.875rem;">Error: ${escapeHtml(error.message)}</div>`;
            } finally { btn.disabled = false; }
        }
        
        function renderInterface() {
            if (!workflowAnalysis) return;
            let html = `<div class="workflow-info"><i data-lucide="file-text" style="width: 16px; height: 16px; display: inline; vertical-align: middle; margin-right: 8px;"></i> ${escapeHtml(workflowAnalysis.title || 'Workflow')}</div>`;
            
            const allInputs = [];
            workflowAnalysis.inputs.forEach(g => g.inputs.forEach(i => allInputs.push({ ...i, groupTitle: g.title })));
            const inputOrder = uiConfig.inputOrder || [];
            const sortedInputs = [...allInputs].sort((a, b) => {
                const ia = inputOrder.indexOf(a.key);
                const ib = inputOrder.indexOf(b.key);
                if (ia === -1) return 1;
                if (ib === -1) return -1;
                return ia - ib;
            });
            
            if (sortedInputs.length > 0) {
                html += `<div class="card"><h2><i data-lucide="image"></i> <span data-i18n="upload_media">Upload Media</span></h2>`;
                sortedInputs.forEach(input => {
                    const isV = input.valueType === 'video';
                    const dName = uiConfig.inputNames?.[input.key] || input.title || input.groupTitle;
                    const presets = workflowPresets.filter(p => !p.assignedInputs || p.assignedInputs.length === 0 || p.assignedInputs.includes(input.key));
                    
                    html += `<div class="input-container">
                        <div class="input-header"><i data-lucide="${isV ? 'film' : 'image'}" style="width: 16px; height: 16px;"></i><span class="name">${escapeHtml(dName)}</span></div>
                        <div class="upload-area" onclick="document.getElementById('file_${input.key}').click()">
                            <i data-lucide="upload" style="width: 24px; height: 24px; color: var(--secondary);"></i>
                            <div style="font-size: 0.8125rem;"><span data-i18n="click_or_drag">Click or drag</span> ${isV ? 'video' : 'image'}</div>
                            <input type="file" id="file_${input.key}" accept="${isV ? 'video/*' : 'image/*'}" style="display: none">
                        </div>
                        <div id="preview_${input.key}" class="image-preview"></div>`;
                    if (!isV && presets.length > 0) {
                        html += `<div class="preset-section"><div class="preset-title" data-i18n="preset_images">Preset Images</div><div class="preset-list">`;
                        presets.forEach(p => {
                            html += `<img class="preset-thumb" src="${p.dataUrl}" title="${escapeHtml(p.name)}" onclick='usePreset(${JSON.stringify(p).replace(/'/g, "&#39;")}, "${input.key}")'>`;
                        });
                        html += `</div></div>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            }
            
            if (workflowAnalysis.advancedInputs) {
                html += `<div class="card"><h2><i data-lucide="sliders"></i> <span data-i18n="params">Parameters</span></h2>`;
                workflowAnalysis.advancedInputs.forEach(group => {
                    let hasV = false;
                    let gHtml = `<div style="margin-bottom: 24px;"><h3>${escapeHtml(group.title)}</h3>`;
                    group.inputs.forEach(p => {
                        if (uiConfig.visibleParams?.[p.key] === false) return;
                        hasV = true;
                        const def = p.defaultValue !== undefined ? p.defaultValue : p.value;
                        currentParameters[p.key] = def;
                        const isS = p.key.includes('seed') || p.title?.toLowerCase().includes('seed');
                        let iHtml = '';
                        if (isS) {
                            const isA = autoRandomSeed[p.key] !== false;
                            iHtml = `<div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                <input type="number" id="param_${p.key}" value="${def}" ${isA ? 'disabled' : ''} style="flex: 1; ${isA ? 'opacity: 0.5;' : ''}">
                                <button type="button" class="random-btn" data-param="${p.key}"><i data-lucide="shuffle" style="width: 14px; height: 14px;"></i></button>
                                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.75rem; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; cursor: pointer;">
                                    <input type="checkbox" class="auto-random-check" data-param="${p.key}" ${isA ? 'checked' : ''} style="width: auto;"> <span data-i18n="auto_random">Auto</span>
                                </label>
                            </div>`;
                        } else if (p.valueType === 'boolean') {
                            iHtml = `<select id="param_${p.key}"><option value="true" ${def === true ? 'selected' : ''} data-i18n="yes">Yes</option><option value="false" ${def === false ? 'selected' : ''} data-i18n="no">No</option></select>`;
                        } else if (p.valueType === 'number' || p.valueType === 'float') {
                            iHtml = `<input type="number" id="param_${p.key}" value="${def}" step="any">`;
                        } else {
                            iHtml = `<input type="text" id="param_${p.key}" value="${def}">`;
                        }
                        gHtml += `<div class="input-group"><label>${escapeHtml(p.title || p.key)}</label>${iHtml}</div>`;
                    });
                    gHtml += `</div>`;
                    if (hasV) html += gHtml;
                });
                html += `</div>`;
            }
            
            html += `<button class="generate-btn" id="generateBtn"><i data-lucide="sparkles"></i> <span data-i18n="generate">Generate</span></button>`;
            workflowContainer.innerHTML = html;
            lucide.createIcons();
            translatePage(langSelect.value);
            
            // Listeners
            document.getElementById('generateBtn').addEventListener('click', runWorkflow);
            document.querySelectorAll('.random-btn').forEach(b => b.addEventListener('click', () => {
                const k = b.dataset.param;
                const s = generateRandomSeed();
                const i = document.getElementById(`param_${k}`);
                if (i) { i.value = s; currentParameters[k] = s; }
            }));
            document.querySelectorAll('.auto-random-check').forEach(c => c.addEventListener('change', () => {
                const k = c.dataset.param;
                autoRandomSeed[k] = c.checked;
                const i = document.getElementById(`param_${k}`);
                if (i) { i.disabled = c.checked; i.style.opacity = c.checked ? '0.5' : '1'; }
            }));
            sortedInputs.forEach(i => {
                const f = document.getElementById(`file_${i.key}`);
                if (f) f.addEventListener('change', (e) => { if (e.target.files[0]) handleMediaUpload(e.target.files[0], i.key); });
            });
            if (workflowAnalysis.advancedInputs) {
                workflowAnalysis.advancedInputs.forEach(g => g.inputs.forEach(p => {
                    const i = document.getElementById(`param_${p.key}`);
                    if (i && i.tagName !== 'BUTTON') i.addEventListener('change', (e) => { currentParameters[p.key] = e.target.value; });
                }));
            }
        }
        
        async function updateNavigationLinks() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                if (data.adminPort && adminViewLink) {
                    adminViewLink.href = `${window.location.protocol}//${window.location.hostname}:${data.adminPort}/index.html`;
                }
            } catch (error) {
                console.error('Error updating navigation links:', error);
            }
        }

        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        async function checkHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                statusDiv.innerHTML = data.status === 'ok' ? `<i data-lucide="check-circle" style="color: var(--success); width: 14px; height: 14px;"></i> <span class="status-online" data-i18n="connected">Connected</span>` : `<i data-lucide="alert-circle" style="color: var(--error); width: 14px; height: 14px;"></i> <span class="status-offline" data-i18n="disconnected">Disconnected</span>`;
                lucide.createIcons();
                translatePage(langSelect.value);
            } catch (error) {
                statusDiv.innerHTML = `<i data-lucide="alert-circle" style="color: var(--error); width: 14px; height: 14px;"></i> <span class="status-offline" data-i18n="server_unavailable">Unavailable</span>`;
                lucide.createIcons();
                translatePage(langSelect.value);
            }
        }
        
        window.usePreset = usePreset;
        loadWorkflows();
        checkHealth();
        updateNavigationLinks();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
