<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_title">ComfyUI Remote Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .slate-card { background-color: #1e293b; border: 1px solid #334155; }
        .accent-primary { background-color: #3b82f6; }
        .accent-primary:hover { background-color: #2563eb; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .loader-container { position: relative; width: 100px; height: 100px; }
        .loader-circle {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: #3b82f6;
            border-radius: 50%; animation: loader-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .loader-circle:nth-child(2) { animation-delay: -0.3s; border-top-color: #6366f1; }
        .loader-circle:nth-child(3) { animation-delay: -0.6s; border-top-color: #a855f7; }
        @keyframes loader-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .processing-pulse { animation: pulse-text 2s ease-in-out infinite; }
        @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal-bg { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .generate-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 90;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-lg">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight" data-i18n="app_title">ComfyUI Remote Generator</h1>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-900/30 border border-red-500/50 text-red-400 text-sm font-medium">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span data-i18n="disconnected">ComfyUI not responding</span>
            </div>

            <div class="flex items-center gap-4">
                <a href="#" id="view-admin-link" class="text-sm font-medium text-slate-400 hover:text-white transition-colors flex items-center gap-2">
                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                    <span data-i18n="admin_view">Admin View</span>
                </a>
                <div class="h-6 w-px bg-slate-800"></div>
                <div class="flex items-center gap-2">
                    <i data-lucide="languages" class="w-4 h-4 text-slate-400"></i>
                    <select id="language-select" class="bg-slate-800 border border-slate-700 text-sm rounded-md px-2 py-1 outline-none">
                        <option value="en">English</option>
                        <option value="hr">Hrvatski</option>
                        <option value="sl">Slovenščina</option>
                        <option value="sk">Slovenčina</option>
                        <option value="ro">Română</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-950 space-y-8 scrollbar-hide">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight" data-i18n="select_workflow_menu">Select a workflow</h2>
                    <p class="text-slate-400 text-sm" data-i18n="admin_configured">Workflows are configured by the administrator</p>
                </div>
                <select id="workflow-select" class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white outline-none focus:ring-2 focus:ring-blue-500 min-w-[300px] shadow-lg">
                    <option value="">-- Select a workflow --</option>
                </select>
            </div>

            <!-- Loading Overlay -->
            <div id="loading-overlay" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center">
                <div class="text-center">
                    <div class="loader-container mx-auto mb-8">
                        <div class="loader-circle"></div>
                        <div class="loader-circle"></div>
                        <div class="loader-circle"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i data-lucide="zap" class="w-8 h-8 text-blue-500 animate-pulse"></i>
                        </div>
                    </div>
                    <p class="text-2xl font-bold text-white mb-2 processing-pulse" data-i18n="processing">Processing...</p>
                    <p class="text-slate-400 text-sm max-w-xs mx-auto" data-i18n="processing_hint">Please wait while the AI magic happens</p>
                </div>
            </div>

            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-600 py-20 bg-slate-900/20 rounded-3xl border-2 border-dashed border-slate-800/50">
                <i data-lucide="workflow" class="w-20 h-20 mb-6 opacity-20"></i>
                <p class="text-xl font-medium" data-i18n="select_workflow_menu">Select a workflow from the menu above</p>
            </div>

            <div id="generator-interface" class="hidden space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Left: Unified Inputs & Presets -->
                    <div class="space-y-8">
                        <div id="presets-card" class="slate-card rounded-xl p-6 shadow-xl hidden">
                            <h3 class="text-lg font-bold flex items-center gap-2 mb-6">
                                <i data-lucide="layout-template" class="w-5 h-5 text-purple-500"></i>
                                <span data-i18n="preset_images">Presets</span>
                            </h3>
                            <div id="presets-container" class="grid grid-cols-4 gap-3"></div>
                        </div>

                        <div id="active-inputs-container" class="space-y-6">
                            <!-- All visible inputs in admin-defined order -->
                        </div>
                    </div>

                    <!-- Right: Execution & Results -->
                    <div class="space-y-6">
                        <div class="slate-card rounded-xl p-6 shadow-xl flex flex-col h-full min-h-[500px]">
                            <div class="flex items-center justify-between mb-6">
                                <h3 class="text-lg font-bold flex items-center gap-2">
                                    <i data-lucide="image" class="w-5 h-5 text-amber-500"></i>
                                    <span data-i18n="result">Result</span>
                                </h3>
                            </div>

                            <div id="output-display" class="flex-1 flex items-center justify-center bg-slate-900/50 rounded-lg border-2 border-dashed border-slate-800 relative overflow-hidden min-h-[400px]">
                                <div id="output-placeholder" class="text-slate-700 text-center p-8">
                                    <i data-lucide="sparkles" class="w-12 h-12 mb-4 mx-auto opacity-20"></i>
                                    <p data-i18n="check_connection">Ready to generate</p>
                                </div>
                                <div id="output-media-container" class="w-full h-full hidden flex items-center justify-center bg-black"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Output Browser (Collapsible for User) -->
                <div class="slate-card rounded-xl p-6 shadow-xl">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4">
                            <h3 class="text-lg font-bold flex items-center gap-2 cursor-pointer" onclick="toggleCollapse('outputs-gallery-container')">
                                <i data-lucide="history" class="w-5 h-5 text-pink-500"></i>
                                <span data-i18n="output_browser">Output Browser</span>
                                <i data-lucide="chevron-down" id="outputs-gallery-chevron" class="w-4 h-4 ml-2 transition-transform"></i>
                            </h3>
                        </div>
                        <button id="refresh-outputs-btn" class="p-2 hover:bg-slate-700 rounded-full transition-all">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="outputs-gallery-container" class="transition-all duration-300 overflow-hidden">
                        <div id="outputs-gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 pb-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Generate Button -->
    <button id="generate-btn" class="generate-fab px-10 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold rounded-full transition-all transform hover:scale-105 active:scale-95 flex items-center gap-2">
        <i data-lucide="zap" class="w-5 h-5"></i>
        <span data-i18n="generate">Generate</span>
    </button>

    <!-- Pixaroma Host Container -->
    <div id="pixaroma-host" class="fixed inset-0 z-[9998] pointer-events-none"></div>

    <div id="media-modal" class="hidden fixed inset-0 z-[200] modal-bg flex items-center justify-center p-4">
        <button id="close-modal" class="absolute top-6 right-6 p-3 bg-black/50 text-white rounded-full transition-all"><i data-lucide="x" class="w-8 h-8"></i></button>
        <div id="modal-content" class="max-w-7xl max-h-[90vh] w-full h-full flex items-center justify-center"></div>
    </div>

    <script src="/translations.js?v=1.0.6"></script>
    <script type="module">
        import { openPixaromaEditor } from '/pixaroma_shim.js';
        window.openPixaromaEditor = openPixaromaEditor;
    </script>
    <script src="/qwen3d.js?v=1.0.6"></script>
    <script>
        let currentWorkflow = null;
        let currentWorkflowId = null;
        window.mediaFiles = {};
        let mediaFiles = window.mediaFiles;
        let parameters = {};
        let bypassedNodes = {};
        let uiConfig = null;

        function toggleBypass(nodeId) { bypassedNodes[nodeId] = !bypassedNodes[nodeId]; renderInterface(); }
        function toggleRandom(key) {
            if (!parameters['_autoRandomSeed']) parameters['_autoRandomSeed'] = {};
            parameters['_autoRandomSeed'][key] = !parameters['_autoRandomSeed'][key];
            renderInterface();
        }

        async function loadWorkflows() {
            try {
                const res = await fetch('/api/workflows/list');
                const data = await res.json();
                const select = document.getElementById('workflow-select');
                select.innerHTML = '<option value="" data-i18n="select_workflow_menu">-- Select a workflow --</option>';
                data.workflows.forEach(w => {
                    const opt = document.createElement('option');
                    opt.value = w.id;
                    opt.textContent = w.name;
                    select.appendChild(opt);
                });
                translatePage(localStorage.getItem('preferredLanguage') || 'en');
            } catch (e) { console.error(e); }
        }

        async function loadWorkflow(id) {
            if (!id) {
                document.getElementById('generator-interface').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }
            try {
                const res = await fetch(`/api/workflows/load/${id}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    currentWorkflowId = id;
                    currentWorkflow = { ...data.analysis, originalValues: data.originalValues };
                    uiConfig = data.uiConfig;
                    window.mediaFiles = {}; mediaFiles = window.mediaFiles; parameters = {}; bypassedNodes = {};
                    document.getElementById('empty-state').classList.add('hidden');
                    document.getElementById('generator-interface').classList.remove('hidden');
                    renderInterface();
                    renderPresets(data.presets || []);
                    translatePage(localStorage.getItem('preferredLanguage') || 'en');
                }
            } catch (e) { console.error(e); }
        }

        function renderPresets(presets) {
            const container = document.getElementById('presets-container');
            const card = document.getElementById('presets-card');
            container.innerHTML = '';
            if (!presets || presets.length === 0) { card.classList.add('hidden'); return; }
            card.classList.remove('hidden');
            presets.forEach(p => {
                const div = document.createElement('div');
                div.className = 'relative aspect-square rounded-lg bg-slate-900 overflow-hidden border border-slate-700 hover:border-blue-500 transition-all cursor-pointer';
                div.innerHTML = `<img src="${p.url}" class="w-full h-full object-cover">`;
                div.onclick = () => {
                    if (p.mediaFiles) { window.mediaFiles = { ...window.mediaFiles, ...p.mediaFiles }; mediaFiles = window.mediaFiles; }
                    if (p.parameters) parameters = { ...parameters, ...p.parameters };
                    if (p.bypassedNodes) bypassedNodes = { ...bypassedNodes, ...p.bypassedNodes };
                    renderInterface();
                };
                container.appendChild(div);
            });
        }

        function renderInterface() {
            const container = document.getElementById('active-inputs-container');
            container.innerHTML = '';

            const order = uiConfig.inputOrder || [];
            const visibleInputs = uiConfig.visibleInputs || {};
            const visibleParams = uiConfig.visibleParams || {};

            // Track handled Qwen nodes
            const handledNodes = new Set();

            order.forEach(key => {
                let obj = null;
                currentWorkflow.inputs.forEach(g => { const f = g.inputs.find(i => i.key === key); if (f) obj = { type: 'media', data: f }; });
                if (!obj) { currentWorkflow.advancedInputs.forEach(g => { const f = g.inputs.find(p => p.key === key); if (f) obj = { type: 'param', data: f }; }); }
                if (!obj) return;

                // Specialized 3D handling
                if (obj.type === 'param' && (obj.data.nodeType === 'QwenMultiangleCameraNode' || (obj.data.nodeTitle && obj.data.nodeTitle.includes('Camera')))) {
                    if (handledNodes.has(obj.data.nodeId)) return;
                    handledNodes.add(obj.data.nodeId);
                    if (window.renderQwen3DCard) {
                        window.renderQwen3DCard(container, obj.data.nodeId, parameters, currentWorkflow, uiConfig, bypassedNodes, (id) => toggleBypass(id));
                        return;
                    }
                }

                // Pixaroma Editor Handling
                if (obj.type === 'param' && obj.data.valueType === 'pixaroma_editor') {
                    const isVisible = (obj.type === 'media' ? visibleInputs[key] : visibleParams[key]) !== false;
                    if (!isVisible) return;
                    const isBypassed = bypassedNodes[obj.data.nodeId];
                    const label = uiConfig.inputNames?.[key] || obj.data.title;
                    const div = document.createElement('div');
                    div.className = 'slate-card p-6 rounded-xl space-y-4 shadow-lg';

                    div.innerHTML = `<div class="flex items-center justify-between mb-2"><label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest">${label}</label><button onclick="toggleBypass('${obj.data.nodeId}')" class="text-[10px] font-bold px-2 py-0.5 rounded border border-slate-700 ${isBypassed ? 'bg-red-900/50 text-red-400 border-red-500/50' : 'text-slate-500'}">BYPASS</button></div>
                    <button id="btn-editor-${key}" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all shadow-lg hover:shadow-indigo-500/20 ${isBypassed ? 'opacity-30 pointer-events-none' : ''}">
                        <i data-lucide="layout" class="w-5 h-5"></i>
                        <span>Open ${label}</span>
                    </button>`;

                    container.appendChild(div);
                    const btn = div.querySelector(`#btn-editor-${key}`);
                    btn.onclick = () => {
                        if (window.openPixaromaEditor) {
                            // FIX: Use originalValues from workflow if parameters[key] is not yet set
                            let initialData = parameters[key] !== undefined ? parameters[key] : (currentWorkflow.originalValues && currentWorkflow.originalValues[key] !== undefined ? currentWorkflow.originalValues[key] : obj.data.defaultValue);

                            if (typeof initialData === 'string' && (initialData.startsWith('{') || initialData.startsWith('['))) {
                                try { initialData = JSON.parse(initialData); } catch(e) {}
                            }
                            window.openPixaromaEditor(obj.data.nodeType, initialData, async (jsonStr) => {
                                // Crucial: Update local parameters immediately
                                const finalValue = typeof jsonStr === 'object' ? JSON.stringify(jsonStr) : jsonStr;
                                parameters[key] = finalValue;

                                // SYNC locally for immediate reopen
                                if (currentWorkflow.originalValues) {
                                    if (typeof jsonStr === 'string' && (jsonStr.startsWith('{') || jsonStr.startsWith('['))) {
                                        try { currentWorkflow.originalValues[key] = JSON.parse(jsonStr); } catch(e) { currentWorkflow.originalValues[key] = jsonStr; }
                                    } else {
                                        currentWorkflow.originalValues[key] = jsonStr;
                                    }
                                }

                                console.log(`[User] Pixaroma ${obj.data.nodeType} save received. Syncing...`);

                                if (currentWorkflowId) {
                                    try {
                                        const res = await fetch('/api/workflows/save-parameters', {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ workflowId: currentWorkflowId, parameters: { [key]: finalValue } })
                                        });
                                        const data = await res.json();
                                        if (data.success) console.log(`[User] Pixaroma data persisted and synced on server.`);
                                        else console.error(`[User] Sync failed:`, data.error);
                                    } catch (e) { console.error(`[User] Sync error:`, e); }
                                }
                            });
                        } else {
                            alert('Pixaroma Bridge not loaded');
                        }
                    };
                    if (window.lucide) window.lucide.createIcons();
                    return;
                }

                const isVisible = (obj.type === 'media' ? visibleInputs[key] : visibleParams[key]) !== false;
                if (!isVisible) return;

                const isBypassed = bypassedNodes[obj.data.nodeId];
                const label = uiConfig.inputNames?.[key] || obj.data.title;

                const div = document.createElement('div');
                div.className = 'slate-card p-6 rounded-xl space-y-4 shadow-lg';

                if (obj.type === 'media') {
                    div.innerHTML = `
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-bold text-slate-300 uppercase tracking-wider">${label}</label>
                            <button onclick="toggleBypass('${obj.data.nodeId}')" class="text-[10px] font-bold px-2 py-0.5 rounded border border-slate-700 ${isBypassed ? 'bg-red-900/50 text-red-400 border-red-500/50' : 'text-slate-500'}">BYPASS</button>
                        </div>
                        <div class="relative aspect-video bg-slate-900 rounded-lg border-2 border-dashed border-slate-700 hover:border-blue-500 transition-all overflow-hidden flex items-center justify-center cursor-pointer ${isBypassed ? 'opacity-30 pointer-events-none' : ''}">
                            <input type="file" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="handleMediaUpload(this.files[0], '${key}')">
                            <div id="preview-${key}" class="text-center"><i data-lucide="${obj.data.valueType === 'video' ? 'video' : 'image'}" class="w-10 h-10 mb-2 mx-auto text-slate-600"></i><p class="text-xs text-slate-500">Click or drag</p></div>
                        </div>
                    `;
                } else {
                    const cur = parameters[key] !== undefined ? parameters[key] : obj.data.defaultValue;
                    const isRandom = parameters['_autoRandomSeed']?.[key] === true;
                    let inputHtml = '';
                    if (obj.data.valueType === 'boolean') {
                        inputHtml = `<select class="w-full bg-slate-800 border border-slate-700 rounded-md px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none ${isBypassed ? 'opacity-30 pointer-events-none' : ''}" onchange="parameters['${key}'] = this.value">
                                    <option value="true" ${cur === 'true' || cur === true ? 'selected' : ''}>Yes</option>
                                    <option value="false" ${cur === 'false' || cur === false ? 'selected' : ''}>No</option>
                                </select>`;
                    } else {
                        inputHtml = `
                        <div class="relative">
                            <input type="${obj.data.valueType === 'number' ? 'number' : 'text'}" value="${cur || ''}"
                                class="w-full bg-slate-800 border border-slate-700 rounded-md px-4 py-2.5 pr-12 text-sm focus:ring-2 focus:ring-blue-500 outline-none ${isBypassed ? 'opacity-30 pointer-events-none' : ''} ${isRandom ? 'text-slate-500 italic' : ''}"
                                ${isRandom ? 'disabled' : ''}
                                onchange="parameters['${key}'] = this.value">
                            ${obj.data.valueType === 'number' && (
                                (obj.data.inputName || '').toLowerCase().includes('seed') ||
                                (obj.data.originalName || '').toLowerCase().includes('seed') ||
                                (label || '').toLowerCase().includes('seed') ||
                                (key || '').toLowerCase().includes('seed')
                            ) ? `
                            <button onclick="toggleRandom('${key}')" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded hover:bg-slate-700 transition-colors ${isRandom ? 'text-blue-400 bg-blue-500/10' : 'text-slate-500'}" title="${getTranslation('toggle_randomization')}">
                                <i data-lucide="dice-5" class="w-4 h-4"></i>
                            </button>` : ''}
                        </div>`;
                    }
                    div.innerHTML = `<div class="flex items-center justify-between mb-2"><label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest">${label}</label><button onclick="toggleBypass('${obj.data.nodeId}')" class="text-[10px] font-bold px-2 py-0.5 rounded border border-slate-700 ${isBypassed ? 'bg-red-900/50 text-red-400 border-red-500/50' : 'text-slate-500'}">BYPASS</button></div>${inputHtml}`;
                }
                container.appendChild(div);
            });
            if (window.lucide) window.lucide.createIcons();
        }

        async function handleMediaUpload(file, key) {
            if (!file) return;
            const p = document.getElementById(`preview-${key}`);
            p.innerHTML = '<div class="loader ease-linear rounded-full border-2 border-t-2 border-blue-500 h-6 w-6 mx-auto"></div>';
            const fd = new FormData(); fd.append('media', file);
            try {
                const res = await fetch(`/api/upload/media/${key}`, { method: 'POST', body: fd });
                const data = await res.json();
                window.mediaFiles[key] = data.filename;
                p.innerHTML = data.type === 'video' ? `<video src="/output/${data.filename}" class="w-full h-full object-cover"></video>` : `<img src="/output/${data.filename}" class="w-full h-full object-cover">`;
            } catch (e) { p.innerHTML = '<i data-lucide="alert-circle" class="w-8 h-8 text-red-500 mx-auto"></i>'; if (window.lucide) window.lucide.createIcons(); }
        }

        async function runWorkflow() {
            const btn = document.getElementById('generate-btn');
            const overlay = document.getElementById('loading-overlay');
            btn.disabled = true; overlay.classList.remove('hidden');
            try {
                const res = await fetch('/api/workflow/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ workflowId: document.getElementById('workflow-select').value, mediaFiles: window.mediaFiles, parameters, bypassedNodes }) });
                const data = await res.json();
                if (data.success && data.files.length > 0) {
                    const f = data.files[0]; const c = document.getElementById('output-media-container'); const ph = document.getElementById('output-placeholder');
                    ph.classList.add('hidden'); c.classList.remove('hidden'); c.innerHTML = f.type === 'video' ? `<video src="${f.url}" controls autoplay class="max-w-full max-h-full"></video>` : `<img src="${f.url}" class="max-w-full max-h-full object-contain cursor-pointer" onclick="showModal('${f.url}', 'image')">`;
                    refreshOutputs();
                } else if (data.error) { alert('Error: ' + data.error); }
            } catch (e) { alert('Connection error'); } finally { btn.disabled = false; overlay.classList.add('hidden'); }
        }

        async function refreshOutputs() {
            try {
                const res = await fetch('/api/outputs');
                const data = await res.json();
                const g = document.getElementById('outputs-gallery'); g.innerHTML = '';
                if (data.files.length === 0) { g.innerHTML = '<div class="col-span-full text-center py-12 text-slate-600 italic">No items found</div>'; return; }
                data.files.forEach(f => {
                    const card = document.createElement('div'); card.className = 'slate-card rounded-lg overflow-hidden group cursor-pointer relative aspect-square';
                    card.innerHTML = f.type === 'video' ? `<video src="${f.url}" class="w-full h-full object-cover"></video><div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-black/40"><i data-lucide="play-circle" class="w-10 h-10 text-white opacity-80"></i></div>` : `<img src="${f.url}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500">`;
                    card.onclick = () => showModal(f.url, f.type); g.appendChild(card);
                });
                if (window.lucide) window.lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        function showModal(url, type) { const m = document.getElementById('media-modal'); const c = document.getElementById('modal-content'); c.innerHTML = type === 'video' ? `<video src="${url}" controls autoplay class="max-w-full max-h-full rounded-lg"></video>` : `<img src="${url}" class="max-w-full max-h-full object-contain rounded-lg">`; m.classList.remove('hidden'); }
        function toggleCollapse(id) { const el = document.getElementById(id); const ch = document.getElementById(id.replace('container', 'chevron')); if (el.style.maxHeight === '0px') { el.style.maxHeight = '2000px'; if (ch) ch.style.transform = 'rotate(0deg)'; } else { el.style.maxHeight = '0px'; if (ch) ch.style.transform = 'rotate(-90deg)'; } }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons(); loadWorkflows(); refreshOutputs();
            document.getElementById('workflow-select').onchange = (e) => loadWorkflow(e.target.value);
            document.getElementById('generate-btn').onclick = runWorkflow;
            document.getElementById('refresh-outputs-btn').onclick = refreshOutputs;
            document.getElementById('close-modal').onclick = () => document.getElementById('media-modal').classList.add('hidden');
            const ls = document.getElementById('language-select'); ls.value = localStorage.getItem('preferredLanguage') || 'en'; ls.onchange = (e) => translatePage(e.target.value);
            fetch('/api/config').then(r => r.json()).then(cfg => { document.getElementById('view-admin-link').href = `http://${window.location.hostname}:${cfg.adminPort}`; });
            setInterval(async () => { try { const r = await fetch('/api/health'); const d = await r.json(); const b = document.getElementById('status-badge'); if (d.comfyui === 'connected') { b.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-900/30 border border-emerald-500/50 text-emerald-400 text-sm font-medium'; b.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span data-i18n="connected">Connected</span>'; } else { b.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-900/30 border border-red-500/50 text-red-400 text-sm font-medium'; b.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span><span data-i18n="disconnected">Disconnected</span>'; } translatePage(localStorage.getItem('preferredLanguage') || 'en'); } catch (e) {} }, 5000);
        });
    </script>
</body>
</html>
